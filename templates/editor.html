<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>圖文產生器</title>
<style>
/* ------------------------------------------------------------------
   編輯台（[[發布前預覽介面]]）
   核心：文字是可以直接編輯的東西，不是 prompt 的產物。
   - 圖卡上的每一個字：點下去直接改（改的就是資料本身）
   - 出圖是純函式：主題／比例隨時切，不可能弄丟東西
   - LLM 只提議：建議以 diff 呈現，人逐條接受或拒絕
   - 面板上沒有任何驗證／原文對照的介面（那條線留在幕後）
------------------------------------------------------------------- */
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#F2F1EE; --panel:#FFFFFF; --ink:#171717; --soft:#6B6862; --mute:#A29D93;
  --line:#E2DFD8; --acc:#EDEAE2;   /* 按鈕選中／主要鍵：跟側欄選中素材同色（Human 2026-07-20 指定） */
  --acc-line:#CFC9BC; --ok:#0A7A4B; --warn:#B96A00; --bad:#C0392B;
  --r:10px;
}
html,body { height:100%; }
body { background:var(--bg); color:var(--ink);
       font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
       font-size:14px; display:flex; overflow:hidden; }
button { font:inherit; cursor:pointer; border:1px solid var(--line); background:#fff;
         border-radius:7px; padding:6px 12px; color:var(--ink); }
button:hover { border-color:#BBB; }
button.on { background:var(--acc); color:var(--ink); border-color:var(--acc-line); font-weight:700; }
button.pri { background:var(--acc); color:var(--ink); border-color:var(--acc-line); font-weight:700; }
button.ghost { border:none; background:transparent; padding:4px 6px; color:var(--soft); }
button.ghost:hover { color:var(--ink); }
input[type=text], textarea { font:inherit; border:1px solid var(--line); border-radius:7px;
  padding:7px 10px; width:100%; background:#fff; color:var(--ink); }
textarea { resize:vertical; min-height:70px; line-height:1.7; }
.small { font-size:12px; color:var(--soft); }
.tiny { font-size:11px; color:var(--mute); }

/* ---------- 側欄 ---------- */
#side { width:250px; flex:none; background:var(--panel); border-right:1px solid var(--line);
        display:flex; flex-direction:column; }
#side h1 { font-size:16px; padding:16px 16px 4px; }
#side .hint { padding:0 16px 10px; font-size:11px; color:var(--mute); line-height:1.6; }
#arts { flex:1; overflow:auto; padding:4px 8px 16px; }
.art { padding:10px 10px; border-radius:8px; cursor:pointer; margin-bottom:2px; }
.art:hover { background:#F4F2ED; }
.art.on { background:#EDEAE2; }
.art .t { font-size:13px; font-weight:700; line-height:1.45;
          display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.art .m { font-size:11px; color:var(--mute); margin-top:3px; display:flex; align-items:center; gap:6px; }
.art .artdel { margin-left:auto; opacity:0; padding:0 4px; font-size:12px; }
.art:hover .artdel { opacity:.8; }
.art .artdel:hover { opacity:1; color:var(--bad); }
#dropHint { margin:10px 12px 14px; border:1.5px dashed var(--line); border-radius:10px;
            padding:12px; text-align:center; font-size:12px; color:var(--mute); line-height:1.7; }

/* ---------- 主區 ---------- */
#main { flex:1; display:flex; flex-direction:column; min-width:0; }
#topbar { background:var(--panel); border-bottom:1px solid var(--line);
          padding:10px 18px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
#topbar .sep { width:1px; height:22px; background:var(--line); }
#topbar label { font-size:12px; font-weight:700; color:var(--soft); }
#handle { width:200px; padding:6px 9px; font-size:13px; }
.approw { display:flex; align-items:center; gap:10px; margin:6px 0; flex-wrap:wrap; }
.approw > label { flex:none; font-size:12.5px; font-weight:700; color:var(--soft); margin-left:8px; }
.approw > label:first-child { margin-left:0; }
.approw #handle { flex:1; min-width:160px; max-width:240px; }
.apphr { height:1px; background:var(--line); margin:14px 0 4px; }
#themeSel { font:inherit; font-size:13px; padding:6px 9px; border:1px solid var(--line);
            border-radius:7px; background:#fff; }
#viewBtns { display:flex; flex:1; gap:10px; align-items:center; }
#cogBtn { margin-left:auto; }
.seg-group { display:inline-flex; border:1px solid var(--line); border-radius:8px; overflow:hidden; }
.seg-group button { border:none; border-radius:0; padding:6px 16px; background:#fff; }
.seg-group button + button { border-left:1px solid var(--line); }
.seg-group button.on { background:var(--acc); color:var(--ink); font-weight:700; }
#outBtn { background:var(--acc); color:var(--ink); border-color:var(--acc-line); font-weight:700; padding:6px 18px; }
#saveState { position:fixed; right:16px; bottom:12px; z-index:40; font-size:11.5px;
             color:var(--soft); background:var(--panel); border:1px solid var(--line);
             border-radius:999px; padding:4px 12px; }
#saveState:empty { display:none; }
#saveState.err { color:var(--bad); font-weight:700; }
#viewBtns { margin-left:auto; }

#tabs { display:flex; gap:6px; align-items:center; padding:12px 18px 0; }
#tabs:empty { display:none; }
.tab { padding:6px 14px; border-radius:8px 8px 0 0; border:1px solid var(--line);
       border-bottom:none; background:#EAE7E0; font-size:13px; cursor:pointer; }
.tab.on { background:var(--panel); font-weight:700; }
#stage { flex:1; overflow:auto; padding:14px 18px 16px; }

/* ---------- 卡片編輯 ---------- */
#deck { display:grid; grid-template-columns:repeat(auto-fill,minmax(295px,1fr)); gap:16px; }
.cell { background:var(--panel); border:1px solid var(--line); border-radius:var(--r);
        overflow:hidden; display:flex; flex-direction:column; }
.shot { width:100%; aspect-ratio:1/1; position:relative; overflow:hidden; background:#111; }
.shot[data-ratio="4x5"] { aspect-ratio:4/5; }
.shot iframe { position:absolute; top:0; left:0; width:1080px; height:1080px; border:0;
               transform-origin:top left; }
.cellbar { display:flex; align-items:center; gap:4px; padding:7px 9px;
           border-top:1px solid var(--line); }
.cellbar .k { font-size:11px; font-weight:800; letter-spacing:.08em; color:var(--mute); }
.cellbar .fit { font-size:11px; font-weight:700; margin-left:4px; }
.fit.ok { color:var(--ok); } .fit.warn { color:var(--warn); } .fit.bad { color:var(--bad); }
.cellbar .sp { flex:1; }
.addcell { border:1.5px dashed var(--line); border-radius:var(--r); min-height:200px;
           display:flex; flex-direction:column; align-items:center; justify-content:center;
           gap:8px; color:var(--mute); background:transparent; }
.addcell .row { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; }
#deckNote { margin:10px 2px 0; font-size:11px; color:var(--mute); line-height:1.6; }

/* 出處開關（結尾卡那格） */
.attr { padding:9px 11px; border-top:1px solid var(--line); font-size:12px; line-height:1.6; }
.attr .sw { display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none; }
.dot { width:34px; height:19px; border-radius:10px; background:#CFCBC2; position:relative; flex:none; transition:.15s; }
.dot::after { content:""; position:absolute; top:2px; left:2px; width:15px; height:15px;
              border-radius:50%; background:#fff; transition:.15s; }
.sw.on .dot { background:var(--ok); } .sw.on .dot::after { left:17px; }

/* ---------- 文案 ---------- */
#capWrap { margin-top:26px; background:var(--panel); border:1px solid var(--line);
           border-radius:var(--r); padding:16px 18px; max-width:960px; }
/* 文案分頁：正文吃滿剩餘高度，但整體收在一屏內——能不捲就不捲（Human 2026-07-15） */
#capWrap textarea#capBody { min-height:calc(100vh - 480px); }
#capWrap h3 { font-size:14px; margin-bottom:4px; }
#capWrap .row { margin-top:12px; }
#capWrap .lab { display:flex; align-items:baseline; gap:8px; margin-bottom:5px; }
#capWrap .lab b { font-size:12px; }
.counter { font-size:11px; color:var(--mute); } .counter.bad { color:var(--bad); font-weight:700; }
#capEmpty { color:var(--mute); font-size:13px; line-height:1.8; }

/* ---------- 模擬 ---------- */
.phone { width:392px; margin:0 auto; background:#fff; border:1px solid var(--line);
         border-radius:18px; overflow:hidden; box-shadow:0 8px 30px rgba(0,0,0,.08); }
.phone.dark { background:#101010; color:#F3F3F3; border-color:#222; }
.ig-head { display:flex; align-items:center; gap:9px; padding:11px 13px; }
.ava { width:32px; height:32px; border-radius:50%; flex:none;
       background:conic-gradient(#FEDA75,#FA7E1E,#D62976,#962FBF,#4F5BD5); }
.phone.dark .ava { background:#333; }
.ig-head b { font-size:13px; }
.car { position:relative; width:100%; aspect-ratio:1/1; overflow:hidden; background:#000; }
.car[data-ratio="4x5"] { aspect-ratio:4/5; }
.car .strip { display:flex; height:100%; transition:transform .25s; }
.car .fr { position:relative; width:100%; height:100%; flex:none; overflow:hidden; }
.car .fr iframe { position:absolute; top:0; left:0; width:1080px; height:1080px; border:0;
                  transform-origin:top left; pointer-events:none; }
.car .nav { position:absolute; top:50%; transform:translateY(-50%); width:28px; height:28px;
            border-radius:50%; background:rgba(255,255,255,.92); border:none; font-size:14px;
            display:flex; align-items:center; justify-content:center; }
.car .nav.l { left:8px; } .car .nav.r { right:8px; }
.car .cnt { position:absolute; top:10px; right:10px; background:rgba(0,0,0,.6); color:#fff;
            font-size:11px; padding:2px 8px; border-radius:10px; }
.dots { display:flex; gap:4px; justify-content:center; padding:8px 0 2px; }
.dots i { width:6px; height:6px; border-radius:50%; background:#C9C5BC; }
.dots i.on { background:#3897F0; }
.ig-acts { display:flex; gap:14px; padding:8px 13px 2px; font-size:20px; }
.ig-cap { padding:6px 13px 16px; font-size:13px; line-height:1.6; white-space:pre-wrap;
          word-break:break-word; }
.ig-cap .more { color:var(--mute); cursor:pointer; }
.th-item { display:flex; gap:10px; padding:14px; }
.th-item .col { min-width:0; flex:1; }
.th-cap { font-size:13.5px; line-height:1.7; white-space:pre-wrap; word-break:break-word; margin-top:2px; }
.th-cap.over { color:#FF6B5E; }
.th-imgs { display:flex; gap:8px; overflow-x:auto; margin-top:10px; }
.th-imgs .fr { width:190px; flex:none; aspect-ratio:1/1; border-radius:10px; overflow:hidden;
               position:relative; border:1px solid #2A2A2A; }
.th-imgs .fr[data-ratio="4x5"] { aspect-ratio:4/5; }
.th-imgs .fr iframe { position:absolute; top:0; left:0; width:1080px; height:1080px; border:0;
                      transform-origin:top left; pointer-events:none; }
.th-meta { font-size:11px; color:#8A8A8A; margin-top:10px; }
.simNote { max-width:392px; margin:10px auto 0; font-size:11px; color:var(--mute);
           line-height:1.7; text-align:center; }
.simrow { display:flex; gap:88px; justify-content:center; align-items:flex-start; flex-wrap:wrap; }
.simhead { text-align:center; font-size:12.5px; font-weight:800; letter-spacing:.08em;
           color:var(--soft); margin-bottom:8px; }

/* ---------- 覆蓋層 ---------- */
#ovl { position:fixed; inset:0; background:rgba(20,18,14,.45); display:none;
       align-items:center; justify-content:center; z-index:50; }
#ovl.show { display:flex; }
.modal { background:#fff; border-radius:14px; width:min(720px,92vw); max-height:86vh;
         overflow:auto; padding:20px 22px; }
.modal h3 { font-size:15px; margin-bottom:8px; }
.modal .p { font-size:13px; line-height:1.8; color:var(--soft); }
.modal .btns { display:flex; gap:8px; justify-content:flex-end; margin-top:16px; }
.qrow { display:flex; gap:6px; flex-wrap:wrap; margin:10px 0; }
.diff { border:1px solid var(--line); border-radius:9px; padding:10px 12px; margin-top:10px; }
.diff .dl { font-size:11px; font-weight:800; color:var(--mute); letter-spacing:.06em; margin-bottom:6px; }
.diff .old, .diff .new { font-size:13px; line-height:1.7; padding:7px 9px; border-radius:6px;
                          white-space:pre-wrap; word-break:break-word; }
.diff .old { background:#FBF0EF; color:#8E3B30; text-decoration-color:#D9A79F; margin-bottom:5px; }
.diff .new { background:#EEF7F0; color:#1E5B3A; }
.diff del { background:#F6D8D3; text-decoration:line-through; border-radius:3px; }
.diff ins { background:#CDEBD6; text-decoration:none; border-radius:3px; }
.diff .act { display:flex; gap:6px; margin-top:8px; }
.diff.done { opacity:.45; }
#toast { position:fixed; left:50%; bottom:26px; transform:translateX(-50%);
         background:#1C1B18; color:#fff; padding:10px 18px; border-radius:9px; font-size:13px;
         max-width:70vw; line-height:1.6; display:none; z-index:99; white-space:pre-wrap; }
#dropOvl { position:fixed; inset:0; background:rgba(14,17,22,.72); z-index:60; display:none;
           align-items:center; justify-content:center; color:#fff; font-size:20px; font-weight:800;
           letter-spacing:.1em; }
#dropOvl.show { display:flex; }
#busy { position:fixed; right:20px; bottom:52px; background:#1C1B18; color:#fff;
        border-radius:11px; padding:12px 16px; font-size:12.5px; display:none; z-index:70;
        min-width:220px; line-height:1.7; }
.spin { display:inline-block; width:11px; height:11px; border:2px solid #666; border-top-color:#fff;
        border-radius:50%; animation:sp 0.8s linear infinite; margin-right:7px; vertical-align:-1px; }
@keyframes sp { to { transform:rotate(360deg); } }
#empty { color:var(--mute); text-align:center; margin-top:14vh; line-height:2.1; font-size:14px; }

/* ---------- 後台設定 ---------- */
.setwrap { max-width:1280px; }
/* 左欄約佔半個畫面（模型與 API 六格剛好排成 3×2）；右半給提示詞展開 */
.setcols { display:grid; grid-template-columns:minmax(720px,1fr) minmax(0,1fr); gap:18px;
           align-items:start; }
/* 收合時版面不變寬：左欄維持窄欄，右半留白——提示詞展開時就補進這塊空白 */
.setcols.solo #promptPane { display:none; }
.gtabs { display:flex; gap:6px; margin:4px 0 8px; }
.gtabs button { border-radius:8px 8px 0 0; border-bottom:none; background:#EAE7E0; }
.gtabs button.on { background:var(--acc); color:var(--ink); border-color:var(--acc-line); font-weight:700; }
.prow { display:flex; align-items:baseline; gap:8px; width:100%; text-align:left;
        padding:10px 12px; border:1px solid var(--line); border-radius:8px; margin-top:8px;
        background:#fff; cursor:pointer; font-size:13px; font-weight:700; }
.prow:hover { border-color:#BBB; }
.prow.on { background:var(--acc); color:var(--ink); border-color:var(--acc-line); }
.prow.on .tiny { color:var(--soft); }
#promptPane { position:sticky; top:12px; }
.pane-head { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
.pane-head h3 { margin:0; }
.pane-body textarea { min-height:calc(100vh - 300px); }
.pane-body .mdprev { max-height:calc(100vh - 300px); min-height:calc(100vh - 300px); }
.pane-empty { color:var(--mute); text-align:center; padding:60px 20px !important;
              font-size:13px; line-height:2; }
.denrow { display:grid; grid-template-columns:minmax(0,1fr) 200px; gap:14px; align-items:center;
          padding:12px 0; border-bottom:1px solid var(--line); }
.denrow:last-of-type { border-bottom:none; }
.denrow .shot { border-radius:8px; }
.seg { display:flex; gap:6px; margin:6px 0 4px; flex-wrap:wrap; align-items:center; }
.seg button { padding:6px 14px; }
.seg input { width:74px; font:inherit; border:1px solid var(--line); border-radius:7px; padding:6px 8px; }
.numrow { display:flex; gap:18px; align-items:flex-end; flex-wrap:wrap; padding-top:12px; }
.numrow .sf { width:150px; }
details.advwrap { border:1.5px dashed var(--line); border-radius:var(--r); padding:4px 16px 8px; margin-bottom:18px; }
details.advwrap > summary { cursor:pointer; font-weight:800; font-size:13.5px; padding:10px 2px; color:var(--soft); }
details.advwrap[open] > summary { margin-bottom:10px; }
details.advwrap .setcard { border-style:dashed; }
.setcard { background:var(--panel); border:1px solid var(--line); border-radius:var(--r);
           padding:18px 20px; margin-bottom:18px; }
.setcard h3 { font-size:15px; margin-bottom:2px; }
.setcard .sub2 { font-size:12px; color:var(--mute); margin-bottom:14px; line-height:1.7; }
.setgrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:12px 16px; }
.sf label { display:block; font-size:12px; font-weight:700; margin-bottom:3px; }
.sf input, .sf select { width:100%; font:inherit; border:1px solid var(--line); border-radius:7px;
                        padding:6px 9px; background:#fff; }
.sf .d { font-size:11px; color:var(--mute); margin-top:3px; line-height:1.55; }
.setbtns { display:flex; gap:8px; margin-top:14px; align-items:center; }
.setbtns .st { font-size:12px; color:var(--ok); }
.ptab textarea { font-family:ui-monospace,Consolas,monospace; font-size:12.5px; line-height:1.65;
                 min-height:300px; white-space:pre; }
details.ptab { border:1px solid var(--line); border-radius:9px; padding:10px 14px; margin-top:10px; }
details.ptab summary { cursor:pointer; font-weight:700; font-size:13px; }
.keyrow { display:flex; align-items:center; gap:8px; }
.grphead { grid-column:1/-1; font-size:12.5px; font-weight:800; letter-spacing:.04em;
           padding:8px 10px; border-radius:7px; margin-top:4px; }
.grphead.soft { background:#EEF4EC; color:#2F5D3A; }
.grphead.hard { background:#F6EDE9; color:#8A4A33; }
.grphead .tiny { font-weight:400; margin-left:8px; }
.duo { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:10px; }
.duo textarea { min-height:520px; }
.mdprev { border:1px solid var(--line); border-radius:8px; background:#FBFAF7;
          padding:14px 18px; overflow:auto; max-height:560px; font-size:13px; line-height:1.75; }
.mdprev h1 { font-size:17px; margin:10px 0 6px; } .mdprev h2 { font-size:15px; margin:14px 0 6px; }
.mdprev h3 { font-size:13.5px; margin:12px 0 4px; }
.mdprev p { margin:6px 0; } .mdprev hr { border:none; border-top:1px solid var(--line); margin:12px 0; }
.mdprev code { background:#EFECE5; border-radius:4px; padding:1px 5px; font-size:12px;
               font-family:ui-monospace,Consolas,monospace; }
.mdprev pre { background:#14161A; color:#D8DEE9; border-radius:8px; padding:10px 12px;
              font-size:11.5px; line-height:1.6; overflow:auto; margin:8px 0;
              font-family:ui-monospace,Consolas,monospace; }
.mdprev pre code { background:none; color:inherit; padding:0; }
.mdprev table { border-collapse:collapse; margin:8px 0; font-size:12px; }
.mdprev th, .mdprev td { border:1px solid var(--line); padding:4px 9px; text-align:left; }
.mdprev th { background:#F1EEE7; }
.mdprev blockquote { border-left:3px solid #CFCabc; color:var(--soft); padding:2px 10px; margin:6px 0; }
.mdprev .li { margin:3px 0; }
.keyok { font-size:11px; color:var(--ok); font-weight:700; white-space:nowrap; }
.keyno { font-size:11px; color:var(--warn); font-weight:700; white-space:nowrap; }
</style>
</head>
<body>

<div id="side">
  <h1>圖文產生器</h1>
  <div class="hint">素材（.md）直接拖進視窗，就會開始跑。</div>
  <div id="arts"></div>
  <div id="dropHint">把 .md 拖到這個視窗<br>→ 讀取 → 抽卡 → 開始編輯</div>
</div>

<div id="main">
  <div id="topbar">
    <span id="viewBtns"></span>
  </div>
  <div id="tabs"></div>
  <div id="stage"><div id="empty">← 左邊挑一篇素材，或把 .md 拖進來</div></div>
</div>

<span id="saveState"></span>
<div id="ovl"></div>
<div id="toast"></div>
<div id="dropOvl">放開，開始處理素材</div>
<div id="busy"></div>

<script>
"use strict";
/* =====================================================================
   狀態
===================================================================== */
const S = {
  slug: null, hl: null, posts: {},          // highlights ＋ 各則 post.json
  pi: 1, view: "cards",                     // 目前貼文（1-based）；視圖：cards/caption/sim/settings
  cfg: { handle: "@your_handle", theme: "b", ratio: "1x1" },
  articles: [],
  cap: null,                                // 文案編輯中的 {hook, body, tags}
};
const $ = (q, el) => (el || document).querySelector(q);
const $$ = (q, el) => Array.from((el || document).querySelectorAll(q));
const esc = s => String(s ?? "").replace(/[&<>]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;" }[c]));

function toast(msg, ms) {
  const t = $("#toast"); t.textContent = msg; t.style.display = "block";
  clearTimeout(t._h); t._h = setTimeout(() => t.style.display = "none", ms || 3200);
}
async function api(route, body) {
  const r = await fetch(route, body
    ? { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify(body) }
    : undefined);
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.error || (r.status + " " + route));
  return data;
}

/* =====================================================================
   儲存（自動；LLM 永遠不走這條路——只有人的動作會呼叫 markDirty）
===================================================================== */
let saveTimer = null;
function markDirty() {
  $("#saveState").textContent = "…";
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveNow, 800);
}
async function saveNow() {

/* =====================================================================
   資料存取
===================================================================== */
const post = () => S.hl.posts[S.pi - 1];
const ctx = () => ({
  title: S.hl.source.title, author: S.hl.source.author || "",
  url: S.hl.source.url || "", handle: S.cfg.handle, series: "",
});
function markEdited(card) {
  card.edited = true;
  // 前端同步做一次 evidence 剝除（後端存檔時也會做——資料層才是執法者）
  delete card.evidence;
  (card.steps || []).forEach(s => { if (typeof s === "object") delete s.evidence; });
  ["wrong", "right"].forEach(k => { if (card[k]) delete card[k].evidence; });
  if (card.type === "quote") card.verbatim = false;
}

/* =====================================================================
   卡片 iframe：渲染 + 直接編輯
===================================================================== */
function cardFrame(card, opts) {
  // opts: {scaleTo, editable, onEdit}
  const shot = document.createElement("div");
  shot.className = "shot"; shot.dataset.ratio = S.cfg.ratio;
  const f = document.createElement("iframe");
  f.src = "/templates/card.html";
  shot.appendChild(f);
  const fitEl = opts.fitEl || null;

  const scale = () => {
    const h = S.cfg.ratio === "1x1" ? 1080 : 1350;
    f.style.transform = `scale(${shot.clientWidth / 1080})`;
    f.style.height = h + "px";
  };
  const showFit = (r) => {
    if (!fitEl) return;
    const splittable = card.type === "point" || card.type === "steps";
    if (r.overflow) {
      fitEl.className = "fit " + (splittable ? "warn" : "bad");
      fitEl.textContent = splittable ? "塞不下→出圖時自動拆卡" : "塞不下！這種卡拆不了，請刪字";
    } else if (r.fs < (f.contentWindow.CARD_FS_EFFECTIVE ? f.contentWindow.CARD_FS_EFFECTIVE.comfort : f.contentWindow.CARD_COMFORT_FS)) {
      fitEl.className = "fit " + (splittable ? "warn" : "warn");
      fitEl.textContent = splittable ? `${r.fs}px→出圖時自動拆卡` : `${r.fs}px（偏擠）`;
    } else { fitEl.className = "fit ok"; fitEl.textContent = r.fs + "px"; }
  };

  const draw = c => {                          // 初繪與重繪共用：同一個 iframe 原地重畫
    shot.dataset.ratio = S.cfg.ratio;          // 外框比例跟著設定（就地換比例時要同步）
    const d = f.contentDocument, w = f.contentWindow;
    d.body.dataset.theme = S.cfg.theme;
    d.body.dataset.ratio = S.cfg.ratio;
    if (S.cfg.render) w.FS_OVERRIDES = { min: S.cfg.render.min_fs, max: S.cfg.render.max_fs, comfort: S.cfg.render.comfort_fs };
    const r = w.renderCard(c, ctx());
    scale(); showFit(r);
    if (opts.editable) bindEditable(f, c, opts.onEdit, opts.onRestore, showFit);
  };
  f.onload = () => draw(card);
  // 收筆後的重出**不重載 iframe**——重載會重抓 card.html 與字體，畫面就是那一下在閃
  // （Human 2026-07-15 回報）。原地重畫只換 DOM，不閃。
  shot.redrawCard = c => { try { draw(c); } catch (e) { /* iframe 還沒好就等 onload */ } };
  new ResizeObserver(scale).observe(shot);
  return shot;
}

/* 卡型 → 可編輯的元素與資料欄位的對照表 */
function editableMap(doc, card) {
  const m = [];
  const one = (sel, get, set) => { const el = doc.querySelector(sel); if (el) m.push({ el, get, set }); };
  if (card.type === "cover") {
    one(".angle", () => post().angle, v => post().angle = v);
    one(".hook", () => post().hook || "", v => post().hook = v);
  } else if (card.type === "point") {
    one(".title", () => card.title, v => card.title = v);
    one(".text", () => card.body, v => card.body = v);
  } else if (card.type === "steps") {
    one(".title", () => card.title, v => card.title = v);
    Array.from(doc.querySelectorAll("ol.steps li span:last-child")).forEach((el, i) =>
      m.push({ el, get: () => card.steps[i].text ?? card.steps[i],
               set: v => { if (typeof card.steps[i] === "object") card.steps[i].text = v; else card.steps[i] = v; } }));
  } else if (card.type === "contrast") {
    one(".title", () => card.title, v => card.title = v);
    one(".side.wrong span:last-child", () => card.wrong.text ?? card.wrong, v => card.wrong = { ...(typeof card.wrong === "object" ? card.wrong : {}), text: v });
    one(".side.right span:last-child", () => card.right.text ?? card.right, v => card.right = { ...(typeof card.right === "object" ? card.right : {}), text: v });
  } else if (card.type === "quote") {
    one(".q", () => card.text, v => card.text = v);
  } else if (card.type === "outro") {
    // 出處卡（Human 2026-07-15 要求可編）。改的是 source 本身——顯示與紀錄同一份。
    // 作者一欄只在「素材本來就有作者」時存在：沒有的不能無中生有（出處紅線：不准編）。
    one(".src", () => S.hl.source.title, v => S.hl.source.title = v);
    if (S.hl.source.author) one(".meta", () => S.hl.source.author, v => S.hl.source.author = v);
    one(".url", () => S.hl.source.url || "", v => S.hl.source.url = v);
    one(".handle", () => S.cfg.handle || "", v => {
      S.cfg.handle = v.startsWith("@") ? v : "@" + v;
      $("#handle").value = S.cfg.handle;
      api("/api/config", S.cfg).catch(() => {});   // 帳號存設定，不進 highlights
    });
  }
  return m;
}

/* DOM → 資料：<mark>重點</mark> 序列化回 **重點** */
function serialize(el) {
  let out = "";
  el.childNodes.forEach(n => {
    if (n.nodeType === 3) out += n.data;
    else if (n.nodeName === "MARK") out += "**" + n.textContent + "**";
    else if (n.nodeName === "BR") out += " ";
    else out += n.textContent;
  });
  return out.replace(/ /g, " ").trim();
}

/* 聚焦時 caret 在「渲染後文字」的位置 → 換成原始字串後對應的位置（** 是零寬的） */
function caretOffset(w, el) {
  const sel = w.getSelection();
  if (!sel || !sel.rangeCount) return 0;
  const r = sel.getRangeAt(0), pre = r.cloneRange();
  pre.selectNodeContents(el); pre.setEnd(r.startContainer, r.startOffset);
  return pre.toString().length;
}
function placeCaret(w, el, pos) {
  const node = el.firstChild;
  if (!node || node.nodeType !== 3) return;
  const r = w.document.createRange();
  r.setStart(node, Math.min(pos, node.textContent.length));
  r.collapse(true);
  const sel = w.getSelection(); sel.removeAllRanges(); sel.addRange(r);
}

function bindEditable(frame, card, onEdit, onRestore, showFit) {
  const d = frame.contentDocument, w = frame.contentWindow;
  editableMap(d, card).forEach(({ el, get, set }) => {
    el.contentEditable = "true";
    el.style.outline = "none"; el.style.cursor = "text";
    el.style.borderRadius = "6px";

    // **點進去看到的是原始文字**：`**重點**` 以標記原樣出現。
    // 刪掉 ** 就取消螢光，把想強調的字圈進 ** 就是新的重點——
    // 收筆（Enter 或點別處）後渲染回螢光筆。所見即資料，不用另做什麼「標記模式」。
    el.addEventListener("focus", () => {
      el.style.boxShadow = "0 0 0 3px rgba(120,160,255,.55)";
      if (el.dataset.rawmode === "1") return;
      const off = caretOffset(w, el);            // 先記住點在哪
      const raw = String(get() ?? "");
      el.dataset.rawmode = "1";
      el.textContent = raw;                      // 渲染 → 原始（** 現形）
      let vis = 0, pos = 0;                      // 渲染後位移 → 原始位移（跳過 **）
      while (pos < raw.length && vis < off) {
        if (raw.startsWith("**", pos)) { pos += 2; continue; }
        pos++; vis++;
      }
      placeCaret(w, el, pos);
      showFit(w.autofit(d.body));
    });

    let t = null;
    el.addEventListener("input", () => {          // 邊打邊重新適配字級（不動資料）
      clearTimeout(t);
      t = setTimeout(() => showFit(w.autofit(d.body)), 250);
    });
    el.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); el.blur(); } });
    el.addEventListener("blur", () => {           // 收筆＝改資料＋立刻重出這張卡（螢光渲染回來）
      el.style.boxShadow = "none";
      delete el.dataset.rawmode;
      const v = (el.textContent || "").replace(/\s+/g, " ").trim();
      if (!v || v === String(get() ?? "").trim()) {
        onRestore && onRestore();                 // 沒改也要把螢光畫回來（現在顯示的是原始字串）
        return;
      }
      set(v);
      onEdit && onEdit();
    });
  });
}

/* =====================================================================
   編輯視圖（卡片деck ＋ 文案）
===================================================================== */
const TYPE_NAME = { cover:"封面", point:"重點", steps:"步驟", contrast:"對照", quote:"金句", outro:"出處" };
const NEW_CARD = {
  point:   () => ({ type:"point", title:"新的重點", body:"點文字直接改。這張卡講一個主張，以及它為什麼有效。", edited:true }),
  steps:   () => ({ type:"steps", title:"新的步驟", steps:[{text:"第一步"},{text:"第二步"}], edited:true }),
  contrast:() => ({ type:"contrast", title:"新的對照", wrong:{text:"常見錯法"}, right:{text:"正確做法"}, edited:true }),
  quote:   () => ({ type:"quote", text:"一句值得停下來的話", verbatim:false, edited:true }),
};

function renderEdit() {
  const stage = $("#stage");
  stage.innerHTML = "";
  const p = post();

  // 文案視圖：只放文案
  if (S.view === "caption") {
    const cap = captionPanel();
    cap.style.marginTop = "0";
    stage.appendChild(cap);
    return;
  }

  const deck = document.createElement("div"); deck.id = "deck";

  // -- 封面（angle / hook 都直接改；改標題＝自訂標題）
  deck.appendChild(cellFor({ type:"cover", angle:p.angle, hook:p.hook, stat:p.stat }, true));

  // -- 內容卡
  p.cards.forEach(c => deck.appendChild(cellFor(c, false)));

  // -- 新增卡片（**原地插入**，不重建整個牌組——重建＝所有 iframe 重載＝閃）
  const add = document.createElement("div"); add.className = "addcell";
  add.innerHTML = `<div>＋ 新增卡片</div><div class="row">` +
    Object.keys(NEW_CARD).map(t => `<button data-t="${t}">${TYPE_NAME[t]}</button>`).join("") + `</div>`;
  add.addEventListener("click", e => {
    const t = e.target.dataset && e.target.dataset.t;
    if (!t) return;
    const max = (S.cfg.gen && S.cfg.gen.cards_max) || 18;
    if (p.cards.length >= max) return toast(`一則最多 ${max} 張卡（輪播上限 20 − 封面 − 出處卡）`);
    const c = NEW_CARD[t]();
    p.cards.push(c);
    deck.insertBefore(cellFor(c, false), add);   // 只長出新的那格
    markDirty();
  });
  deck.appendChild(add);

  // -- 結尾卡／出處開關
  deck.appendChild(outroCell(p));

  stage.appendChild(deck);

  const note = document.createElement("div"); note.id = "deckNote";
  note.textContent = "點卡片上的字直接改：點進去會看到原始的 **…** 標記——圈住的字會印成螢光重點，刪掉 ** 就取消、把想強調的字圈進 ** 就是新的重點。按 Enter 或點別處生效。字級標示是版面的物理事實：塞不下的重點／步驟卡出圖時自動拆卡，其他卡型會被擋。";
  stage.appendChild(note);
}

/* 卡片格。**所有操作都原地做**（重繪內容，不動 iframe 節點）——
   iframe 只要被重建或在 DOM 裡搬家就會重新載入＝畫面閃一下（Human 2026-07-15 兩度回報）。
   所以：卡片物件掛在 cell._card 上、索引點擊當下才算（indexOf）、
   換順序＝兩格互換內容而不是搬節點、工具列跟著卡型重建。 */
function cellFor(card, isCover) {
  const cell = document.createElement("div"); cell.className = "cell";
  cell._card = card;
  const fit = document.createElement("span");
  const curIdx = () => post().cards.indexOf(cell._card);
  const coverCard = () => {
    const p = post();
    return { type:"cover", angle:p.angle, hook:p.hook, stat:p.stat };
  };
  const shot = cardFrame(card, {
    editable: true, fitEl: fit,
    onEdit: () => {
      if (!isCover && cell._card.type !== "outro") markEdited(cell._card);
      markDirty();
      if (isCover) cell._card = coverCard();     // 封面的字存在 post 上，重繪要拿最新值
      shot.redrawCard(cell._card);
    },
    onRestore: () => shot.redrawCard(isCover ? (cell._card = coverCard()) : cell._card),
  });
  cell.appendChild(shot);

  const bar = document.createElement("div"); bar.className = "cellbar";
  cell.appendChild(bar);

  // 內容換了（換順序、接受建議）就呼叫這個：換內容＋重建工具列，iframe 原地不動
  cell.assign = c => {
    cell._card = c;
    buildBar();
    shot.redrawCard(c);
  };

  function buildBar() {
    const p = post();
    bar.innerHTML = "";
    const c = cell._card;
    const k = document.createElement("span"); k.className = "k";
    k.textContent = TYPE_NAME[c.type] || c.type;
    bar.appendChild(k); bar.appendChild(fit);
    const sp = document.createElement("span"); sp.className = "sp"; bar.appendChild(sp);

    if (!isCover) {
      if (c.type === "steps") {
        btn(bar, "＋步驟", () => {
          const cc = cell._card;
          if (cc.steps.length >= 6) return toast("最多 6 步（版面契約）");
          cc.steps.push({ text:"新的一步" }); markEdited(cc); markDirty(); shot.redrawCard(cc);
        });
        btn(bar, "−步驟", () => {
          const cc = cell._card;
          if (cc.steps.length <= 2) return toast("至少 2 步");
          cc.steps.pop(); markEdited(cc); markDirty(); shot.redrawCard(cc);
        });
      }
      btn(bar, "🤖", () => openSuggest("card", curIdx()));
      btn(bar, "◀", () => shiftCell(cell, -1));
      btn(bar, "▶", () => shiftCell(cell, +1));
      btn(bar, "🗑", () => {
        const p2 = post();
        if (p2.cards.length <= 2) return toast("至少要 2 張卡（版面契約）");
        if (!confirm("刪掉這張卡？")) return;
        p2.cards.splice(curIdx(), 1);
        cell.remove();                            // 只拆掉自己這格
        markDirty();
      });
    } else {
      btn(bar, "🤖", () => openSuggest("cover"));
    }
  }
  buildBar();
  return cell;
}
function btn(bar, label, fn) { const b = document.createElement("button"); b.className = "ghost"; b.textContent = label; b.onclick = fn; bar.appendChild(b); }
function swap(a, i, j) { [a[i], a[j]] = [a[j], a[i]]; }

/* 換順序＝資料交換＋兩格互換「內容」。不搬 DOM 節點——iframe 搬家會重載（閃）。 */
function shiftCell(cell, dir) {
  const p = post();
  const i = p.cards.indexOf(cell._card);
  const j = i + dir;
  if (i < 0 || j < 0 || j >= p.cards.length) return;
  swap(p.cards, i, j);
  const other = dir < 0 ? cell.previousElementSibling : cell.nextElementSibling;
  if (other && other.assign) {
    const mine = cell._card;
    cell.assign(other._card);
    other.assign(mine);
  }
  markDirty();
}

/* 整副牌就地刷新（張數沒變時用；接受建議、換主題比例都走這裡） */
function refreshDeck() {
  const deck = $("#deck");
  if (!deck) return false;
  const cells = Array.from(deck.children).filter(el => el.assign || el._card);
  const contentCells = cells.filter(el => el._card && el._card.type !== "cover" && el._card.type !== "outro");
  const p = post();
  if (contentCells.length !== p.cards.length) return false;   // 張數變了，交給 renderEdit
  cells.forEach(el => {
    if (!el._card) return;
    if (el._card.type === "cover") el.assign ? el.assign({ type:"cover", angle:p.angle, hook:p.hook, stat:p.stat }) : null;
    else if (el._card.type === "outro") { const sh = el.querySelector(".shot"); sh && sh.redrawCard && sh.redrawCard(el._card); }
  });
  contentCells.forEach((el, i) => el.assign(p.cards[i]));
  return true;
}

/* 結尾卡那格：出處開關住在這裡。
   預設一律附出處；要關掉必須明確宣告「這是我的原創」——錯了也安全的那一邊當預設。 */
function outroCell(p) {
  const cell = document.createElement("div"); cell.className = "cell";
  if (!p.original) {
    const card = { type:"outro" };
    cell._card = card;
    let shotRef;
    shotRef = cardFrame(card, {
      editable: true,
      onEdit: () => { markDirty(); shotRef.redrawCard(card); },
      onRestore: () => shotRef.redrawCard(card),
    });
    cell.appendChild(shotRef);
  } else {
    const ph = document.createElement("div");
    ph.style.cssText = "aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;color:var(--mute);font-size:13px;text-align:center;line-height:1.9";
    ph.innerHTML = "已宣告原創<br>這則不出結尾卡（出處卡）";
    cell.appendChild(ph);
  }
  const bar = document.createElement("div"); bar.className = "attr";
  const sw = document.createElement("div"); sw.className = "sw" + (p.original ? "" : " on");
  sw.innerHTML = `<span class="dot"></span><span>${p.original ? "不附出處（已宣告原創）" : "附出處（預設）"}</span>`;
  sw.onclick = () => p.original ? reattach(p) : declareOriginal(p);
  bar.appendChild(sw);
  cell.appendChild(bar);
  return cell;
}
function declareOriginal(p) {
  openModal(`
    <h3>關掉出處？</h3>
    <div class="p">出處卡是這則貼文<b>唯一</b>標註來源的地方。關掉它，等於宣告這些內容是你的原創——
    如果實際上取材自別人的作品，那就是把別人的東西掛自己的名字發出去。</div>
    <div class="p" style="margin-top:10px"><label style="display:flex;gap:8px;align-items:flex-start;cursor:pointer">
      <input type="checkbox" id="declChk" style="margin-top:3px">
      <span>我宣告：<b>這則貼文的內容是我的原創</b>，並非取材自他人的文章或影片。</span></label></div>
    <div class="btns"><button onclick="closeModal()">取消</button>
    <button class="pri" id="declOk" disabled>宣告並關掉出處</button></div>`);
  $("#declChk").onchange = e => $("#declOk").disabled = !e.target.checked;
  $("#declOk").onclick = () => { p.original = true; closeModal(); markDirty(); renderEdit(); };
}
function reattach(p) { delete p.original; markDirty(); renderEdit(); }

/* =====================================================================
   文案（hook / 正文 / hashtag 直接編輯）
===================================================================== */
function splitCaption(pj) {
  const ig = pj.posts.find(x => x.platform === "instagram") || pj.posts[0];
  const tags = ig.hashtags || [];
  let cap = ig.caption;
  const tagLine = tags.join(" ");
  if (tagLine && cap.endsWith(tagLine)) cap = cap.slice(0, -tagLine.length).trimEnd();
  const blocks = cap.split("\n\n");
  return { hook: blocks[0] || "", body: blocks.slice(1).join("\n\n"), tags: tags.slice() };
}
function joinCaption(c, withTags) {
  const parts = [c.hook, c.body].filter(Boolean);
  if (withTags && c.tags.length) parts.push(c.tags.join(" "));
  return parts.join("\n\n");
}
function captionPanel() {
  const wrap = document.createElement("div"); wrap.id = "capWrap";
  const pj = S.posts[String(S.pi)];
  if (!pj) {
    wrap.innerHTML = `<h3>文案</h3><div id="capEmpty">這則還沒有文案。按右上角「輸出」（發 IG／Threads，或存到本地資料夾），會自動出圖＋寫初稿——之後這裡的每一個字都可以直接改。</div>`;
    return wrap;
  }
  if (!S.cap) S.cap = splitCaption(pj);
  const c = S.cap;

/* =====================================================================
   LLM 建議（diff 呈現，人逐條接受／拒絕；永遠不直接覆蓋）
===================================================================== */
function textFields(card) {
  // 送給模型的內容：**只有文字**。evidence／edited 這些資料層的事不出現在這條路上。
  const c = JSON.parse(JSON.stringify(card));
  delete c.evidence; delete c.edited;
  (c.steps || []).forEach(s => delete s.evidence);
  ["wrong","right"].forEach(k => { if (c[k]) delete c[k].evidence; });
  delete c.verbatim;
  return c;
}
function openSuggest(scope, cardIdx, presetInstruction) {
  const quick = scope === "card"
    ? ["改短", "換個說法", "更口語", "把重點標出來"]
    : scope === "cover" ? ["換一個 hook", "標題更有張力", "更具體"]
    : scope === "redraft" ? [] : [];
  openModal(`
    <h3>${scope === "redraft" ? "重新起草這則" : "請模型給建議"}</h3>
    <div class="p">模型只會給<b>建議</b>，以並排差異呈現——要不要採用，一條一條由你決定。</div>
    ${scope === "redraft" ? `<div class="row" style="margin-top:10px"><div class="lab"><b>題目與走向</b><span class="tiny">可留白＝模型自己判斷。例：「走實戰路線，聚焦步驟」「入門介紹，講給第一次聽的人」</span></div><input type="text" id="sgDir"></div>` : ""}
    <div class="qrow">${quick.map(q => `<button data-q="${q}">${q}</button>`).join("")}</div>
    <div class="row"><input type="text" id="sgFree" placeholder="或自己下指示，例：這張卡幫我改短、語氣不要像說明書"></div>
    <div class="btns"><button onclick="closeModal()">取消</button><button class="pri" id="sgGo">要建議</button></div>
    <div id="sgOut"></div>`);
  if (presetInstruction !== undefined && presetInstruction !== "") $("#sgFree").value = presetInstruction;
  const go = instr => runSuggest(scope, cardIdx, instr);
  $$(".qrow button").forEach(b => b.onclick = () => go(b.dataset.q));
  $("#sgGo").onclick = () => {
    const dir = $("#sgDir") ? $("#sgDir").value.trim() : "";
    const instr = [$("#sgFree").value.trim(), dir && ("題目與走向：" + dir)].filter(Boolean).join("；");
    go(instr);
  };
}
async function runSuggest(scope, cardIdx, instruction) {
  const p = post();
  let kind, content;
  if (scope === "card") { kind = p.cards[cardIdx].type; content = textFields(p.cards[cardIdx]); }
  else if (scope === "cover") { kind = "cover"; content = { angle: p.angle, hook: p.hook || "" }; }
  else if (scope === "caption") { kind = "caption"; content = { hook: S.cap.hook, body: S.cap.body, hashtags: S.cap.tags }; }
  else { kind = "redraft"; content = { angle: p.angle, hook: p.hook || "", cards: p.cards.map(textFields) }; }
  const out = $("#sgOut");
  out.innerHTML = `<div class="p" style="margin-top:14px"><span class="spin"></span>模型正在想…（十幾秒）</div>`;
  try {
    const { suggestion } = await api("/api/suggest", { slug: S.slug, kind, content, instruction });
    out.innerHTML = "";
    buildDiffs(scope, cardIdx, content, suggestion, out);
  } catch (e) { out.innerHTML = `<div class="p" style="color:var(--bad);margin-top:12px">要不到建議：${esc(e.message)}</div>`; }
}

/* 字元層級 diff（LCS）——句子等級的比對，夠用了 */
function charDiff(a, b) {
  a = Array.from(a); b = Array.from(b);
  const n = a.length, m = b.length;
  if (n * m > 250000) return { old: esc(a.join("")), neu: esc(b.join("")) }; // 太長就不逐字比
  const dp = Array.from({ length: n + 1 }, () => new Uint16Array(m + 1));
  for (let i = n - 1; i >= 0; i--) for (let j = m - 1; j >= 0; j--)
    dp[i][j] = a[i] === b[j] ? dp[i+1][j+1] + 1 : Math.max(dp[i+1][j], dp[i][j+1]);
  let i = 0, j = 0, oldH = "", newH = "";
  while (i < n && j < m) {
    if (a[i] === b[j]) { oldH += esc(a[i]); newH += esc(b[j]); i++; j++; }
    else if (dp[i+1][j] >= dp[i][j+1]) { oldH += `<del>${esc(a[i])}</del>`; i++; }
    else { newH += `<ins>${esc(b[j])}</ins>`; j++; }
  }
  while (i < n) { oldH += `<del>${esc(a[i++])}</del>`; }
  while (j < m) { newH += `<ins>${esc(b[j++])}</ins>`; }
  return { old: oldH, neu: newH };
}
function flat(x) {
  if (x == null) return "";
  if (typeof x === "string") return x;
  if (Array.isArray(x)) return x.map(flat).join("\n");
  if (typeof x === "object") {
    if ("text" in x && Object.keys(x).length <= 2) return x.text;
    return ["title","body","text","steps","wrong","right"].filter(k => k in x)
      .map(k => (k === "wrong" ? "✗ " : k === "right" ? "✓ " : "") + flat(x[k])).join("\n");
  }
  return String(x);
}
function diffRow(out, label, oldVal, newVal, apply) {
  const o = flat(oldVal), n = flat(newVal);
  if (o.trim() === n.trim()) return;
  const d = charDiff(o, n);
  const el = document.createElement("div"); el.className = "diff";
  el.innerHTML = `<div class="dl">${esc(label)}</div>
    <div class="old">${d.old || "（空）"}</div><div class="new">${d.neu || "（空）"}</div>
    <div class="act"><button class="pri">接受</button><button>略過</button></div>`;
  const [ok, no] = el.querySelectorAll(".act button");
  ok.onclick = () => { apply(); el.classList.add("done"); ok.disabled = no.disabled = true; ok.textContent = "已套用"; markDirty(); };
  no.onclick = () => { el.classList.add("done"); ok.disabled = no.disabled = true; };
  out.appendChild(el);
}
function buildDiffs(scope, cardIdx, oldC, sug, out) {
  const p = post();
  let any = false; const row = (...a) => { any = true; diffRow(...a); };
  if (scope === "card") {
    const card = p.cards[cardIdx];
    const applyField = fn => () => { fn(); markEdited(card); };
    if (sug.title !== undefined && card.title !== undefined) row(out, "標題", card.title, sug.title, applyField(() => card.title = sug.title));
    if (sug.body !== undefined) row(out, "內文", card.body, sug.body, applyField(() => card.body = sug.body));
    if (sug.text !== undefined) row(out, "文字", card.text, sug.text, applyField(() => card.text = sug.text));
    if (sug.steps) row(out, "步驟", card.steps, sug.steps, applyField(() => card.steps = sug.steps.map(s => typeof s === "object" ? { text: s.text } : { text: s })));
    if (sug.wrong) row(out, "錯法", card.wrong, sug.wrong, applyField(() => card.wrong = { text: flat(sug.wrong) }));
    if (sug.right) row(out, "正確", card.right, sug.right, applyField(() => card.right = { text: flat(sug.right) }));
  } else if (scope === "cover") {
    if (sug.angle !== undefined) row(out, "標題（angle）", p.angle, sug.angle, () => p.angle = sug.angle);
    if (sug.hook !== undefined) row(out, "副標（hook）", p.hook || "", sug.hook, () => p.hook = sug.hook);
  } else if (scope === "caption") {
    if (sug.hook !== undefined) row(out, "hook", S.cap.hook, sug.hook, () => { S.cap.hook = sug.hook; saveCaption(); });
    if (sug.body !== undefined) row(out, "正文", S.cap.body, sug.body, () => { S.cap.body = sug.body; saveCaption(); });
    if (sug.hashtags) row(out, "hashtag", S.cap.tags.join(" "), (sug.hashtags || []).join(" "),
      () => { S.cap.tags = sug.hashtags.map(t => t.startsWith("#") ? t : "#" + t); saveCaption(); });
  } else { // redraft：逐張卡並排
    if (sug.angle !== undefined) row(out, "標題（angle）", p.angle, sug.angle, () => p.angle = sug.angle);
    if (sug.hook !== undefined) row(out, "副標（hook）", p.hook || "", sug.hook, () => p.hook = sug.hook);
    const sc = sug.cards || [];
    const max = Math.max(p.cards.length, sc.length);
    for (let i = 0; i < max; i++) {
      const oldCard = p.cards[i], newCard = sc[i];
      const label = `卡片 ${i + 1}` + (newCard ? `（${TYPE_NAME[newCard.type] || newCard.type}）` : "");
      if (oldCard && newCard) {
        row(out, label, textFields(oldCard), newCard, ((idx, nc) => () => {
          const c = normalizeCard(nc); if (c) { p.cards[idx] = c; }
        })(i, newCard));
      } else if (!oldCard && newCard) {
        row(out, label + "（新增）", "", newCard, ((nc) => () => {
          const c = normalizeCard(nc); if (c && p.cards.length < 6) p.cards.push(c);
        })(newCard));
      } else if (oldCard && !newCard) {
        row(out, label + "（建議刪除）", textFields(oldCard), "", ((idx) => () => {
          if (p.cards.length > 2) p.cards.splice(idx, 1);
        })(i));
      }
    }
  }
  if (!any) out.innerHTML = `<div class="p" style="margin-top:12px">模型覺得不用改（或改了跟沒改一樣）。換個指示再試。</div>`;
  else {
    const done = document.createElement("div"); done.className = "btns";
    done.innerHTML = `<button class="pri">完成，回到編輯</button>`;
    done.querySelector("button").onclick = () => {
      closeModal();
      if (S.view !== "cards" || !refreshDeck()) renderAll();
    };
    out.appendChild(done);
  }
}
function normalizeCard(c) {
  try {
    const t = c.type;
    if (t === "point") return { type:"point", title:String(c.title||"重點"), body:String(c.body||""), edited:true };
    if (t === "quote") return { type:"quote", text:String(c.text||""), verbatim:false, edited:true };
    if (t === "steps") return { type:"steps", title:String(c.title||"步驟"),
      steps:(c.steps||[]).map(s => ({ text: String((s && s.text) ?? s ?? "") })).filter(s => s.text), edited:true };
    if (t === "contrast") return { type:"contrast", title:String(c.title||"對照"),
      wrong:{ text: flat(c.wrong) }, right:{ text: flat(c.right) }, edited:true };
  } catch (e) { /* ignore */ }
  return null;
}

function deckCards() {
  const p = post();
  const cards = [{ type:"cover", angle:p.angle, hook:p.hook, stat:p.stat }, ...p.cards];
  if (!p.original) cards.push({ type:"outro" });
  return cards;
}
function frameInto(container, card, widthPx) {
  const f = document.createElement("iframe"); f.src = "/templates/card.html";

    f.contentWindow.renderCard(card, ctx());

function _igPhone(cards, text) {

  const dots = $(".dots", phone);

   後台設定（[[編輯台後台設定]]）

// 軟限制＝編輯目標：寫進提示詞的傾向，模型往這裡寫，**超過不會被擋**
const GEN_SOFT = [

/* 迷你 Markdown 預覽（零依賴）。夠用就好：標題、粗體、行內碼、圍欄、表格、清單、引用、分隔線 */
function mdRender(md) {
  const e_ = t => t.replace(/[&<>]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;" }[c]));
  const inline = t => e_(t)
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/\*\*([^*]+)\*\*/g, "<b>$1</b>");
  const lines = md.split("\n");
  let out = "", i = 0, fence = false, fbuf = [], pbuf = [];
  const closeP = () => { if (pbuf.length) { out += `<p>${pbuf.map(inline).join("<br>")}</p>`; pbuf = []; } };
  while (i < lines.length) {
    const l = lines[i];
    if (l.trim().startsWith("```")) {
      if (!fence) { closeP(); fence = true; fbuf = []; }
      else { fence = false; out += `<pre><code>${e_(fbuf.join("\n"))}</code></pre>`; }
      i++; continue;
    }
    if (fence) { fbuf.push(l); i++; continue; }
    if (/^\s*$/.test(l)) { closeP(); i++; continue; }
    const h = l.match(/^(#{1,6})\s+(.*)/);
    if (h) { closeP(); const n = Math.min(h[1].length, 3); out += `<h${n}>${inline(h[2])}</h${n}>`; i++; continue; }
    if (/^\s*-{3,}\s*$/.test(l)) { closeP(); out += "<hr>"; i++; continue; }
    if (/^\s*>/.test(l)) { closeP(); out += `<blockquote>${inline(l.replace(/^\s*>\s?/, ""))}</blockquote>`; i++; continue; }
    if (l.trim().startsWith("|")) {
      closeP(); const rows = [];
      while (i < lines.length && lines[i].trim().startsWith("|")) { rows.push(lines[i].trim()); i++; }
      out += "<table>" + rows.filter(r => !/^\|[\s:|-]+\|$/.test(r)).map((r, ri) => {
        const tag = ri === 0 ? "th" : "td";
        return "<tr>" + r.split("|").slice(1, -1).map(c => `<${tag}>${inline(c.trim())}</${tag}>`).join("") + "</tr>";
      }).join("") + "</table>"; continue;
    }
    const li = l.match(/^([\t ]*)[-*]\s+(.*)/);
    if (li) {
      closeP();
      const depth = li[1].replace(/\t/g, "  ").length;
      out += `<div class="li" style="margin-left:${depth * 7}px">• ${inline(li[2])}</div>`;
      i++; continue;
    }
    pbuf.push(l); i++;
  }
  closeP();
  return out;
}

      <div class="sf"><label>Anthropic API key ${keyBadge(d.keys.anthropic)}</label>
        <input data-k="anthropic_key" type="password" placeholder="${d.keys.anthropic ? "留空＝不變" : "貼上 key"}">
        <div class="d">寫進 .env 的 ANTHROPIC_API_KEY</div></div>
    </div>
    <div class="setbtns"><button class="pri" id="llmSave">儲存模型設定</button><span class="st" id="llmSt"></span></div>`;
  lm.querySelector(`[data-k=provider]`).value = l.provider;
  $("#llmSave", lm).onclick = async () => {
    try {
      await api("/api/settings", { settings: { llm: {
        provider: lm.querySelector(`[data-k=provider]`).value,
        gemini_model: lm.querySelector(`[data-k=gemini_model]`).value.trim(),
        anthropic_model: lm.querySelector(`[data-k=anthropic_model]`).value.trim(),
        temperature: parseFloat(lm.querySelector(`[data-k=temperature]`).value),
      }}});
      const gk = lm.querySelector(`[data-k=gemini_key]`).value;
      const ak = lm.querySelector(`[data-k=anthropic_key]`).value;
      if (gk || ak) {
        await api("/api/llm-keys", { gemini_key: gk, anthropic_key: ak });
        lm.querySelector(`[data-k=gemini_key]`).value = "";
        lm.querySelector(`[data-k=anthropic_key]`).value = "";
      }
      $("#llmSt", lm).textContent = "已儲存 ✓";
    } catch (e) { toast(e.message, 8000); }
  };
  left.appendChild(lm);
  left.appendChild(adv);

  const back = document.createElement("div"); back.className = "setbtns";
  back.innerHTML = `<button id="setBack">← 回編輯台</button>`;
  back.querySelector("button").onclick = () => { S.view = "cards"; renderAll(); };
  left.appendChild(back);

  // ---- 右側：提示詞展開面板（sticky，佔右半屏） ----
  function drawPane() {
    $$(".prow", pr).forEach(r => r.className = "prow" + (r.dataset.pn === PP.name ? " on" : ""));
    cols.className = "setcols" + (PP.name ? "" : " solo");   // 沒展開＝參數區吃滿寬
    if (!PP.name) { right.innerHTML = ""; return; }
    right.innerHTML = `<div class="setcard">
      <div class="pane-head"><h3>${PROMPT_NAMES[PP.name]}</h3><span class="tiny">prompts/${PP.name}.md</span>
        <span style="flex:1"></span>
        <button id="ppView" class="${PP.mode === "view" ? "on" : ""}">預覽</button>
        <button id="ppEdit" class="${PP.mode === "edit" ? "on" : ""}">編輯</button>
        <button class="pri" id="ppSave">儲存</button><button id="ppRestore">回復預設</button>
        <button class="ghost" id="ppClose" title="收合">✕</button></div>
      <div class="pane-body"></div>
      <div class="tiny" id="ppSt" style="margin-top:8px"></div></div>`;
    const body = right.querySelector(".pane-body");
    if (PP.mode === "view") {
      const dv = document.createElement("div"); dv.className = "mdprev";
      dv.innerHTML = mdRender(PP.cache[PP.name]);
      body.appendChild(dv);
    } else {
      const ta = document.createElement("textarea");
      ta.value = PP.cache[PP.name];
      ta.addEventListener("input", () => PP.cache[PP.name] = ta.value);
      body.appendChild(ta);
    }
    $("#ppClose", right).onclick = () => { PP.name = null; drawPane(); };
    $("#ppView", right).onclick = () => { PP.mode = "view"; drawPane(); };
    $("#ppEdit", right).onclick = () => { PP.mode = "edit"; drawPane(); };
    $("#ppSave", right).onclick = async () => {
      try {
        await api("/api/prompt", { name: PP.name, content: PP.cache[PP.name] });
        $("#ppSt", right).textContent = "已儲存 ✓（舊產物已過期，重跑分析生效）";
      } catch (e) { toast(e.message, 7000); }
    };
    $("#ppRestore", right).onclick = async () => {
      if (!confirm("把這份提示詞整份換回出廠版？你的修改會不見。")) return;
      try {
        const r = await api("/api/prompt", { name: PP.name, restore: true });
        PP.cache[PP.name] = r.content; drawPane();
        $("#ppSt", right).textContent = "已回復預設 ✓";
      } catch (e) { toast(e.message, 7000); }
    };
  }
  PP.name = null;   // 預設收合——參數區吃滿版寬；點左邊的提示詞才展開右欄
  drawPane();
}



/* =====================================================================
   佈局：側欄、tabs、視圖切換
===================================================================== */
function renderSide() {
  const box = $("#arts"); box.innerHTML = "";
  S.articles.forEach(a => {
    const el = document.createElement("div");
    el.className = "art" + (a.slug === S.slug ? " on" : "");
    el.innerHTML = `<div class="t">${esc(a.title)}</div>
      <div class="m">${a.n_posts > 1 ? a.n_posts + " 則・" : ""}${a.captions.every(Boolean) ? "文案✓" : "草稿"}
      <button class="ghost artdel" title="刪除這篇素材的所有產物">🗑</button></div>`;
    el.onclick = () => openArticle(a.slug);
    el.querySelector(".artdel").onclick = async e => {
      e.stopPropagation();
      if (!confirm(`刪掉「${a.title}」？\n會移除它的知識卡、圖卡與文案（out/${a.slug}/ 整個資料夾）。\n來源筆記（Clippings 的 md）不會動。`)) return;
      try {
        await api("/api/delete-article", { slug: a.slug });
        const st = await api("/api/state");
        S.articles = st.articles;
        if (S.slug === a.slug) {
          S.slug = null; S.hl = null; S.posts = {}; S.cap = null;
          $("#tabs").innerHTML = "";
          $("#stage").innerHTML = `<div id="empty">← 左邊挑一篇素材，或把 .md 拖進來</div>`;
          if (S.articles.length) openArticle(S.articles[0].slug);
        }
        renderSide();
        toast("刪掉了（來源 md 還在，重跑分析隨時能再生）");
      } catch (err) { toast(err.message, 7000); }
    };
    box.appendChild(el);
  });
}
function renderTabs() {
  const t = $("#tabs"); t.innerHTML = "";
  if (S.view === "settings" || !S.hl) return;
  // 一素材一則是常態——這一列只服務多則的舊資料
  if (S.hl.posts.length > 1) {
    S.hl.posts.forEach((p, i) => {
      const b = document.createElement("div");
      b.className = "tab" + (i + 1 === S.pi ? " on" : "");
      b.textContent = `第 ${i + 1} 則`;
      b.title = p.angle;
      b.onclick = () => { S.pi = i + 1; S.cap = null; renderAll(); };
      t.appendChild(b);
    });
    const del = document.createElement("button"); del.className = "ghost"; del.textContent = "🗑 刪除這則";
    del.onclick = async () => {
      const cur = post();
      if (!confirm(`刪掉第 ${S.pi} 則「${cur.angle}」？\n這則的卡片與文案設定都會移除。`)) return;
      const deletedAt = S.pi;
      S.hl.posts.splice(S.pi - 1, 1);
      S.posts = {}; S.cap = null;
      S.pi = Math.min(S.pi, S.hl.posts.length);
      await saveNow();
      try { await api("/api/delete-post", { slug: S.slug, from_index: deletedAt }); } catch (e) { toast(e.message, 6000); }
      try { S.posts = (await api("/api/article?slug=" + encodeURIComponent(S.slug))).posts; } catch (e) { /* noop */ }
      renderAll();
    };
    t.appendChild(del);
  }
}

/* 編輯／模擬／發布——放頂欄帳號右邊（Human 2026-07-15） */
function syncViews() {
  const box = $("#viewBtns");
  box.innerHTML = "";

  // 扁平三視圖（Human 2026-07-19：「編輯」是假分類——真正在切的是圖卡/文案/模擬）
  if (S.hl) {
    const seg = document.createElement("div"); seg.className = "seg-group";
    [["cards","圖卡"],["caption","文案"],["sim","模擬"]].forEach(([v, label]) => {
      const b = document.createElement("button");
      b.textContent = label; b.className = S.view === v ? "on" : "";
      b.onclick = () => { S.view = v; renderAll(); };
      seg.appendChild(b);
    });
    box.appendChild(seg);

    const out = document.createElement("button"); out.id = "outBtn";
    out.textContent = "輸出";
    out.onclick = openPublishModal;
    box.appendChild(out);

    const re = document.createElement("button"); re.className = "ghost";
    re.textContent = "🤖 重新起草…";
    re.onclick = () => openSuggest("redraft");
    box.appendChild(re);
  }

  const cog = document.createElement("button"); cog.id = "cogBtn";
  cog.textContent = "⚙ 設定";
  cog.className = S.view === "settings" ? "on" : "";
  cog.onclick = () => { S.view = S.view === "settings" ? "cards" : "settings"; renderAll(); };
  box.appendChild(cog);
}

function renderAll() {
  renderSide(); renderTabs(); syncViews();
  if (S.view === "settings") { renderSettings(); return; }
  if (!S.hl) {
    $("#stage").innerHTML = `<div id="empty">← 左邊挑一篇素材，或把 .md 拖進來</div>`;
    return;
  }
  if (S.view === "sim") renderSim();
  else renderEdit();           // cards 與 caption 都由 renderEdit 分流
}
async function openArticle(slug) {
  try {
    const d = await api("/api/article?slug=" + encodeURIComponent(slug));
    S.slug = slug; S.hl = d.highlights; S.posts = d.posts; S.pi = 1; S.cap = null;
    renderAll();
  } catch (e) { toast(e.message, 5000); }
}

/* =====================================================================
   topbar：主題／比例／handle／出圖
===================================================================== */
// 主題清單的單一事實來源（card.css 要有對應的 [data-theme=…] token 組；測試釘住一致性）
const THEMES = [
  ["a", "編輯大字"], ["b", "深色螢光"], ["c", "雜誌黑白"], ["d", "奶油暖調"], ["e", "藍圖"],
];
// 外觀（主題／比例／帳號）從頂欄搬進設定頁的常用區（Human 2026-07-19）。
// 這個函式建出那三個控制項，插在常用設定卡最上面；setCfg 改動 cfg 後會同步它們的 UI。
function buildAppearance() {
  const box = document.createElement("div"); box.id = "appear";
  box.innerHTML = `
    <div class="approw">
      <label>主題</label>
      <select id="themeSel">${THEMES.map(([k, n]) => `<option value="${k}">${n}</option>`).join("")}</select>
      <label>比例</label>
      <span class="seg-group"><button id="r1">1:1</button><button id="r2">4:5</button></span>
      <label>帳號</label>
      <input type="text" id="handle" placeholder="@your_handle">
    </div>`;
  box.querySelector("#themeSel").onchange = e => setCfg({ theme: e.target.value });
  box.querySelector("#r1").onclick = () => setCfg({ ratio: "1x1" });
  box.querySelector("#r2").onclick = () => setCfg({ ratio: "4x5" });
  let hT = null;
  box.querySelector("#handle").addEventListener("input", e => {
    clearTimeout(hT); hT = setTimeout(() => setCfg({ handle: e.target.value || "@your_handle" }), 700);
  });
  syncAppearance(box);
  return box;
}
// 只在外觀控制項存在（設定頁開著）時同步其顯示狀態——頂欄已經沒有它們了
function syncAppearance(root) {
  root = root || document;
  const sel = root.querySelector("#themeSel"); if (sel) sel.value = S.cfg.theme;
  const r1 = root.querySelector("#r1"); if (r1) r1.className = S.cfg.ratio === "1x1" ? "on" : "";
  const r2 = root.querySelector("#r2"); if (r2) r2.className = S.cfg.ratio === "4x5" ? "on" : "";
  const h = root.querySelector("#handle"); if (h && document.activeElement !== h) h.value = S.cfg.handle;
}
async function setCfg(patch) {
  Object.assign(S.cfg, patch);
  syncAppearance();   // 設定頁若開著，主題／比例的高亮跟著更新
  // 出圖是純函式：換主題／比例只是重畫。編輯視圖能就地重畫就不重建（重建＝閃）
  if (S.hl && !(S.view === "cards" && refreshDeck())) renderAll();
  try { await api("/api/config", S.cfg); } catch (e) { /* 設定存不進去不擋人 */ }
}

/* =====================================================================
   背景工作顯示
===================================================================== */
function watchJob(id, label, onDone, onError) {
  const el = $("#busy"); el.style.display = "block";
  const tick = async () => {
    let j;
    try { j = await api("/api/job?id=" + id); } catch (e) { j = { status: "error", error: e.message }; }
    if (j.status === "running") {
      el.innerHTML = `<span class="spin"></span>${esc(label)}：${esc(j.stage || "處理中")}`;
      setTimeout(tick, 1200);
    } else if (j.status === "done") {
      el.style.display = "none"; onDone && onDone(j);
    } else {
      el.style.display = "none";
      toast(`${label} 失敗：\n${j.error || "未知錯誤"}`, 9000);
      onError && onError(j);
    }
  };
  tick();
}

/* =====================================================================
   拖放素材（.md）→ 讀取 → 抽卡
===================================================================== */
["dragenter","dragover"].forEach(ev => document.addEventListener(ev, e => {
  e.preventDefault(); $("#dropOvl").classList.add("show");
}));
["dragleave","drop"].forEach(ev => document.addEventListener(ev, e => {
  e.preventDefault();
  if (ev === "dragleave" && e.relatedTarget) return;
  $("#dropOvl").classList.remove("show");
}));
document.addEventListener("drop", async e => {
  const f = Array.from(e.dataTransfer.files).find(x => x.name.endsWith(".md"));
  if (!f) return toast("這裡吃 .md（markdown 素材）");
  const content = await f.text();
  openModal(`
    <h3>處理素材：${esc(f.name)}</h3>
    <div class="p">拖進來就一路跑到底：讀取 → 抽知識卡 → 出圖 → 文案（約一兩分鐘）。跑完每一個字都可以直接改。</div>
    <div class="row" style="margin-top:12px"><div class="lab"><b>要產出幾則、各講什麼</b>
      <span class="tiny">一格＝一則。留白＝那一則的題目由模型判斷。例：「入門介紹」「實戰步驟」</span></div>
      <div id="briefRows"></div>
      <div class="setbtns" style="margin-top:8px"><button id="briefAdd">＋ 加一則</button></div></div>
    <div class="btns"><button onclick="closeModal()">取消</button><button class="pri" id="ingGo">開始</button></div>`);
  const rowsBox = $("#briefRows");
  const addRow = val => {
    const row = document.createElement("div");
    row.style.cssText = "display:flex;gap:6px;margin-top:6px;align-items:center";
    row.innerHTML = `<span class="tiny" style="flex:none;width:44px">第 ${rowsBox.children.length + 1} 則</span>
      <input type="text" class="briefIn" placeholder="題目與走向（留白＝模型判斷）">
      <button class="ghost briefDel" title="移除這則">✕</button>`;
    row.querySelector("input").value = val || "";
    row.querySelector(".briefDel").onclick = () => {
      if (rowsBox.children.length <= 1) return;   // 至少一則
      row.remove();
      Array.from(rowsBox.children).forEach((r, i) => r.querySelector("span").textContent = `第 ${i + 1} 則`);
    };
    rowsBox.appendChild(row);
  };
  addRow();                                        // 預設一則
  $("#briefAdd").onclick = () => {
    if (rowsBox.children.length >= 10) return toast("最多 10 則（失控上限）");
    addRow();
  };
  $("#ingGo").onclick = async () => {
    const briefs = Array.from(rowsBox.querySelectorAll(".briefIn")).map(i => i.value.trim());
    closeModal();
    try {
      const { job } = await api("/api/ingest", { filename: f.name, content, briefs });
      watchJob(job, "處理素材", async j => {
        const st = await api("/api/state");
        S.articles = st.articles; renderSide();
        if (j.slug) openArticle(j.slug);
        toast("素材處理完成：卡片、圖、文案都備好了");
      }, async () => {   // 失敗也刷新——卡片可能已抽好，只是出圖或文案沒成
        const st = await api("/api/state").catch(() => null);
        if (st) { S.articles = st.articles; renderSide(); }
      });
    } catch (err) { toast(err.message, 7000); }
  };
});

/* =====================================================================
   modal 通用
===================================================================== */
function openModal(html) {
  const o = $("#ovl"); o.innerHTML = `<div class="modal">${html}</div>`; o.classList.add("show");
  o.onclick = e => { if (e.target === o) closeModal(); };
}
function closeModal() { const o = $("#ovl"); o.classList.remove("show"); o.innerHTML = ""; }
window.closeModal = closeModal;

/* =====================================================================
   啟動
===================================================================== */
(async function init() {
  try {
    const st = await api("/api/state");
    S.articles = st.articles;
    Object.assign(S.cfg, st.config || {});
    renderSide();
    if (S.articles.length) openArticle(S.articles[0].slug);
  } catch (e) { toast("讀不到狀態：" + e.message, 8000); }
})();
</script>
